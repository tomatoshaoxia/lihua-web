<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Liuhua-Web | 运维练习页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f5f7fa;
            font-family: "微软雅黑",sans-serif;
        }
        .box {
            text-align: center;
            padding: 40px 60px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 0 12px #eee;
        }
        h1 {
            color: #222;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .line {
            width: 220px;
            height: 1px;
            background: #ccc;
            margin: 20px auto;
        }
        .text {
            color: #666;
            font-size: 15px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>✨ 欢迎进入 Liuhua-Web ✨</h1>
        <div class="line"></div>
        <div class="text">
            运维全链路练习环境<br>
            Docker · CI/CD · ELK · 监控<br>
            轻量极简｜无依赖｜易部署
        </div>
    </div>
</body>
</html>
